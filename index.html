<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elxan - Ad Günü Kartı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, #0e1a5e 0%, #060d2e 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* ── SCENE: two pages side by side, only one visible at a time ── */
  .scene {
    width: 320px;
    height: 480px;
    position: relative;
  }

  /* Both pages sit in same spot, front shown first, inside hidden */
  .page {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 6px;
    overflow: hidden;
    background: linear-gradient(150deg, #0c1d5e 0%, #0e2272 40%, #091a55 75%, #07144a 100%);
    border: 2px solid #c9a227;
    box-shadow: 0 0 0 1px rgba(212,175,55,0.2), 0 25px 70px rgba(0,0,0,0.9);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .page-front { opacity: 1; transform: scale(1); z-index: 2; }
  .page-inside { opacity: 0; transform: scale(0.97); z-index: 1; pointer-events: none; }

  /* When open: hide front, show inside */
  .scene.open .page-front  { opacity: 0; transform: scale(0.97); pointer-events: none; }
  .scene.open .page-inside { opacity: 1; transform: scale(1); pointer-events: auto; z-index: 2; }

  /* corners */
  .corner { position: absolute; width: 36px; height: 36px; border-color: #d4af37; border-style: solid; opacity: 0.5; z-index: 3; }
  .c-tl { top: 11px; left: 11px;  border-width: 1.5px 0 0 1.5px; }
  .c-tr { top: 11px; right: 11px; border-width: 1.5px 1.5px 0 0; }
  .c-bl { bottom: 11px; left: 11px;  border-width: 0 0 1.5px 1.5px; }
  .c-br { bottom: 11px; right: 11px; border-width: 0 1.5px 1.5px 0; }

  /* ── FRONT ── */
  .front-content {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 38px;
    gap: 16px;
    position: relative; z-index: 2;
  }

  .photo-ring {
    width: 190px; height: 190px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f5e47a, #d4af37, #b8960c, #d4af37, #f5e47a);
    padding: 3px;
    box-shadow: 0 0 28px rgba(212,175,55,0.55), 0 0 70px rgba(212,175,55,0.12);
    flex-shrink: 0;
  }

  .photo-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
  }

  .photo-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
  }

  .orn { display: flex; align-items: center; gap: 9px; }
  .orn-line { width: 46px; height: 1px; background: linear-gradient(to right, transparent, #d4af37); opacity: 0.6; }
  .orn-line.r { background: linear-gradient(to left, transparent, #d4af37); }
  .orn-dot { width: 5px; height: 5px; background: #d4af37; transform: rotate(45deg); opacity: 0.8; }

  .open-btn {
    margin-top: 6px;
    padding: 11px 30px;
    border: 1.5px solid #d4af37;
    border-radius: 30px;
    background: transparent;
    color: #d4af37;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .open-btn:hover, .open-btn:active {
    background: rgba(212,175,55,0.15);
    box-shadow: 0 0 16px rgba(212,175,55,0.3);
  }

  /* ── INSIDE ── */
  .inside-content {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 30px 28px;
    text-align: center;
    gap: 0;
    position: relative; z-index: 2;
  }

  .greeting {
    font-family: 'Cinzel', serif;
    font-size: 13px; font-weight: 600;
    color: #d4af37;
    letter-spacing: 0.22em;
    margin-bottom: 12px;
  }

  .divider {
    width: 110px; height: 1px;
    background: linear-gradient(to right, transparent, #d4af37, transparent);
    margin: 0 auto 20px;
  }

  .msg-salutation {
    font-family: 'EB Garamond', serif;
    font-style: italic; font-size: 26px;
    color: #f0d060;
    margin-bottom: 6px;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.7s 0.4s ease, transform 0.7s 0.4s ease;
  }
  .msg-subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic; font-size: 17px;
    color: #d4af37;
    margin-bottom: 16px;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.7s 0.7s ease, transform 0.7s 0.7s ease;
  }
  .msg-text {
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    color: #e8c84a;
    line-height: 1.8;
    margin-bottom: 16px;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.7s 1s ease, transform 0.7s 1s ease;
  }
  .msg-closing {
    font-family: 'EB Garamond', serif;
    font-style: italic; font-size: 18px;
    color: #f0d060;
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.7s 1.3s ease, transform 0.7s 1.3s ease;
  }
  .stars {
    margin-top: 16px; font-size: 13px;
    color: #d4af37; letter-spacing: 0.5em;
    opacity: 0;
    transition: opacity 0.7s 1.6s ease;
  }

  /* trigger text fade-in when scene is open */
  .scene.open .msg-salutation,
  .scene.open .msg-subtitle,
  .scene.open .msg-text,
  .scene.open .msg-closing { opacity: 1; transform: translateY(0); }
  .scene.open .stars { opacity: 0.45; }

</style>
</head>

      </div>
      <button class="open-btn" onclick="openCard()">✦ Kartı aç ✦</button>
    </div>
  </div>

  <!-- INSIDE PAGE -->
  <div class="page page-inside">
    <div class="corner c-tl"></div><div class="corner c-tr"></div>
    <div class="corner c-bl"></div><div class="corner c-br"></div>
    <div class="inside-content">
      <div class="greeting">Ad Günün Mübarək</div>
      <div class="divider"></div>
      <div class="msg-salutation">Ömrüm !</div>
      <div class="msg-subtitle">Həyatımın sonsuz sevdası !</div>
      <div class="msg-text">
        Ad gününü bütün qəlbimlə təbrik edirəm 💚<br><br>
        Diləyim budur ki, həyatın sənə bəxş etdiyi hər gün sənə gülər üz, sevinc və xoşbəxtlik gətirsin.
      </div>
      <div class="msg-closing">Sağlıqlı və uzun ömrün olsun, Elxanım <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:1em;height:1em;vertical-align:-0.15em;display:inline-block;"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f5e47a"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#b8960c"/></linearGradient></defs><path fill="url(#g)" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
      <div class="stars">✦ &ensp; ✦ &ensp; ✦</div>
    </div>
  </div>

</div>

<script>
function openCard() {
  document.getElementById('scene').classList.add('open');
  setTimeout(launchConfetti, 300);
}

// ── CONFETTI ──
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const COLORS = ['#d4af37','#f5e47a','#b8960c','#ffffff','#4a90d9','#c9a227','#f0d060','#7ec8e3'];
let pieces = [];
let animating = false;

function launchConfetti() {
  pieces = [];
  for (let i = 0; i < 160; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 250,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 3.5,
      opacity: 1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  if (!animating) { animating = true; animateConfetti(); }
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;
  pieces.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotSpeed;
    p.vy += 0.06;
    if (p.y > canvas.height * 0.7) p.opacity -= 0.018;
    if (p.opacity > 0 && p.y < canvas.height + 20) alive = true;

    ctx.save();
    ctx.globalAlpha = Math.max(0, p.opacity);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    ctx.restore();
  });

  if (alive) requestAnimationFrame(animateConfetti);
  else { animating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
